<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>reel — scroll-scrub demo</title>
<link rel="stylesheet" href="../dist/styles.css" />
<style>
  :root { --ink:#0f0f17; --paper:#f3efe2; --accent:#b45309; }
  * { margin:0; box-sizing:border-box; }
  body { background: var(--ink); color: var(--paper); font-family: ui-sans-serif, system-ui, sans-serif; }
  .reel-video { filter: saturate(1.05); }
  .hero-copy {
    position: sticky; top: 0; height: 100vh;
    display: flex; flex-direction: column; justify-content: center;
    padding: 0 8vw; pointer-events: none;
  }
  .kicker { font-family: ui-monospace, monospace; font-size: 12px; letter-spacing: .3em;
    text-transform: uppercase; color: var(--paper); opacity:.85; }
  h1 { font-size: clamp(48px, 12vw, 160px); line-height:.92; font-weight:800; letter-spacing:-.03em; }
  h1 .accent { color: var(--accent); }
  p.lede { max-width: 34ch; font-size: clamp(16px,2vw,22px); line-height:1.5; color: var(--paper); }
  .cue { position: fixed; bottom: 22px; left:50%; transform:translateX(-50%);
    font-family: ui-monospace, monospace; font-size:11px; letter-spacing:.2em; text-transform:uppercase;
    color: var(--paper); opacity:.6; z-index:5; }
</style>
</head>
<body>
  <!-- The scroll track: its height IS the film's timeline. -->
  <div data-reel-track style="height: 360vh;">
    <div class="reel-stage">
      <video data-reel-video data-reel-preload="eager" class="reel-video"
             src="assets/ink-720.mp4" poster="assets/ink-poster.jpg"
             muted playsinline preload="auto"></video>
      <div class="reel-overlay" style="background: linear-gradient(180deg, rgba(15,15,23,.35), rgba(15,15,23,.15) 40%, rgba(15,15,23,.55));"></div>
    </div>

    <div class="reel-content">
      <div class="hero-copy">
        <div data-reel-reveal="0.02,0.18">
          <p class="kicker">a reel demo</p>
        </div>
        <div data-reel-reveal="0.06,0.34" data-reel-rise="40">
          <h1>Scroll is<br>the <span class="accent">timeline</span>.</h1>
        </div>
        <div data-reel-reveal="0.4,0.7">
          <p class="lede">The whole background is one continuous film. You scrub through it by scrolling — every frame is chosen by you.</p>
        </div>
      </div>
    </div>
  </div>

  <div class="cue">scroll ↓</div>

  <script type="module">
    import { auto } from "../dist/core.js";
    auto();
  </script>
</body>
</html>
