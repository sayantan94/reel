<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>reel · hero</title>
<link rel="stylesheet" href="reel.css" />
<style>
  :root { --ink:#0f0f17; --paper:#f3efe2; --accent:#f0663b; }
  * { margin:0; box-sizing:border-box; }
  body { background:var(--ink); color:var(--paper); font-family:ui-sans-serif,system-ui,sans-serif; }
  .reel-video { filter:saturate(1.05); }
  .copy { position:sticky; top:0; height:100vh; display:flex; flex-direction:column; justify-content:center; padding:0 8vw; pointer-events:none; }
  .kicker { font-family:ui-monospace,monospace; font-size:12px; letter-spacing:.32em; text-transform:uppercase; opacity:.85; }
  h1 { font-size:clamp(52px,12vw,168px); line-height:.9; font-weight:800; letter-spacing:-.035em; }
  h1 .accent { color:var(--accent); }
  p.lede { max-width:34ch; font-size:clamp(16px,2vw,22px); line-height:1.5; }
  .cue { position:fixed; bottom:22px; left:50%; transform:translateX(-50%); font:600 11px ui-monospace,monospace; letter-spacing:.2em; text-transform:uppercase; opacity:.6; }
  .home { position:fixed; top:18px; left:20px; z-index:6; font:600 12px ui-monospace,monospace; color:var(--paper); text-decoration:none; opacity:.7; }
</style>
</head>
<body>
  <a class="home" href="index.html">← examples</a>
  <div class="reel-track" data-reel-track style="height:360vh;">
    <div class="reel-stage">
      <video class="reel-video" data-reel-video data-reel-preload="eager"
             src="assets/ink.mp4" poster="assets/ink-poster.jpg" muted playsinline></video>
      <div class="reel-overlay" style="background:linear-gradient(180deg,rgba(15,15,23,.35),rgba(15,15,23,.1) 40%,rgba(15,15,23,.55));"></div>
    </div>
    <div class="reel-content">
      <div class="copy">
        <div data-reel-reveal="0.02,0.16"><p class="kicker">reel · hero</p></div>
        <div data-reel-reveal="0.06,0.34" data-reel-rise="44"><h1>Scroll is<br>the <span class="accent">timeline</span>.</h1></div>
        <div data-reel-reveal="0.42,0.72"><p class="lede">The whole background is one film. You scrub through it by scrolling — every frame is chosen by you.</p></div>
      </div>
    </div>
  </div>
  <div class="cue">scroll ↓</div>
  <script type="module">
    import { auto } from "./reel.core.js";
    auto();
  </script>
</body>
</html>
